services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: learning_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: learning_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: learning_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: learning_platform
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    depends_on:
      - mysql
    image: phpmyadmin
    ports:
        - "8090:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: "${DB_USERNAME}"
      PMA_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: root
      UPLOAD_LIMIT: 300M
      PMA_ARBITRARY: 1


  redis:
    image: redis:7-alpine
    container_name: learning_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
